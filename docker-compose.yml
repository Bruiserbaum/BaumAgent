# ─────────────────────────────────────────────────────────────────────────────
# BaumAgent — docker-compose
#
# Network configuration
# ─────────────────────────────────────────────────────────────────────────────
# By default all services run on the internal `baumagent` bridge network.
#
# To connect BaumAgent to the BaumDocker ai-stack (so it can reach Ollama,
# OpenWebUI, etc. by container name) set these env vars in Portainer:
#
#   CONNECT_AI_FRONTEND=true   → joins the ai_frontend network
#   CONNECT_AI_BACKEND=true    → joins the ai_backend network
#
# If both are false/unset the external network sections are simply ignored.
# The network names match the BaumDocker ai-stack defaults (ai_frontend /
# ai_backend). Override with AISTACK_FRONTEND_NET / AISTACK_BACKEND_NET if
# your stack was renamed.
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: baumagent-api
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - baumagent
      - ai_frontend_net
      - ai_backend_net
    ports:
      - "${BAUMAGENT_PORT:-8100}:8000"
    volumes:
      - ./data/db:/app/data
      - ./data/repos:/app/repos
    environment:
      DATABASE_URL: sqlite:////app/data/baumAgent.db
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_USER_NAME: ${GITHUB_USER_NAME:-BaumAgent}
      GITHUB_USER_EMAIL: ${GITHUB_USER_EMAIL:-baumagent@localhost}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: baumagent-worker
    restart: unless-stopped
    depends_on:
      - redis
      - api
    networks:
      - baumagent
      - ai_backend_net
    command: python -m worker.worker_entrypoint
    volumes:
      - ./data/db:/app/data
      - ./data/repos:/app/repos
    environment:
      DATABASE_URL: sqlite:////app/data/baumAgent.db
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_USER_NAME: ${GITHUB_USER_NAME:-BaumAgent}
      GITHUB_USER_EMAIL: ${GITHUB_USER_EMAIL:-baumagent@localhost}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}

  redis:
    image: redis:7-alpine
    container_name: baumagent-redis
    restart: unless-stopped
    networks:
      - baumagent
    volumes:
      - ./data/redis:/data
    command: redis-server --save 60 1 --loglevel warning

networks:
  baumagent:
    name: baumagent

  # BaumDocker ai-stack networks — set external: true once you have the
  # ai-stack deployed. The name must match what docker created (check with
  # `docker network ls`). Defaults match the BaumDocker defaults.
  ai_frontend_net:
    external: true
    name: ${AISTACK_FRONTEND_NET:-aistackgithub_ai_frontend}

  ai_backend_net:
    external: true
    name: ${AISTACK_BACKEND_NET:-aistackgithub_ai_backend}
